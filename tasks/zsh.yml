# zsh section
- name: Install zsh
  become: true
  apt:
    name: zsh

- name: Check .oh-my-installer
  stat:
    path: $HOME/.oh-my-installer
  register: oh_my_stats

- name: Install oh-my-zsh
  shell: curl -L https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh > ~/.oh-my-installer && chmod +x ~/.oh-my-installer && ~/.oh-my-installer
  when: oh_my_stats.stat.exists == false
  become_user: "{{user_name}}"

- name: Check powerlevel10k
  stat:
    path: $HOME/powerlevel10k
  register: powerlevel10k 

- name: Install powerlevel10k
  shell: git clone --depth=1 https://github.com/romkatv/powerlevel10k.git ~/powerlevel10k && echo 'source ~/powerlevel10k/powerlevel10k.zsh-theme' >> ~/.zshrc
  when: powerlevel10k.stat.exists == false

- name: Check old zsh config
  stat:
    path: $HOME/.zshrc
  register: zshrc_config

- name: Remove old zsh config
  shell: rm $HOME/.zshrc
  when: zshrc_config.stat.exists == true
