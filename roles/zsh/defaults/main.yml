---
# defaults file for zsh
zsh_package: "zsh"
zsh_users: []

zsh_oh_my_zsh_installer_url: "https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh"

zsh_powerlevel10k_git: "https://github.com/romkatv/powerlevel10k.git"
zsh_powerlevel10k_git_version: v1.20.0

zsh_fonts:
  - url: "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Regular.ttf"
    filename: "MensloNFRegular.ttf"
  - url: "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold.ttf"
    filename: "MensloNFBold.ttf"
  - url: "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Italic.ttf"
    filename: "MensloNFItalic.ttf"
  - url: "https://github.com/romkatv/powerlevel10k-media/raw/master/MesloLGS%20NF%20Bold%20Italic.ttf"
    filename: "MensloNFBoldItalic.ttf"
