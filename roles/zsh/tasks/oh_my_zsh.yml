---
- name: Install git
  become: true
  ansible.builtin.package:
    name: git
    state: present

- name: Download oh-my-zsh Installer
  ansible.builtin.get_url:
    url: "{{ zsh_oh_my_zsh_installer_url }}"
    dest: "{{ ansible_facts['user_dir'] }}/.oh-my-installer"
    mode: a+x

- name: Install oh-my-zsh
  ansible.builtin.shell:
    cmd: >
      set -o pipefail &&
      echo "y" |
      "{{ ansible_facts['user_dir'] }}/.oh-my-installer"
    executable: /bin/bash
    creates: "{{ ansible_facts['user_dir'] }}/.oh-my-zsh"
