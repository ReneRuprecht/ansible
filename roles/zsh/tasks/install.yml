---
- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: "ansible_facts['os_family'] == 'Debian'"

- name: Install zsh
  become: true
  ansible.builtin.package:
    name: "{{ zsh_package }}"
    state: present

- name: Set zsh Shell
  become: true
  ansible.builtin.user:
    name: "{{ item }}"
    shell: "/bin/zsh"
    state: present
  loop: "{{ zsh_users }}"
